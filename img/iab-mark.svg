<svg xmlns="http://www.w3.org/2000/svg" viewBox="14 2 92 104" fill="none">
  <!-- ===== behavior taxonomy tree (shared, on top) ===== -->
  <g stroke-linecap="round" stroke-linejoin="round" stroke-width="3" fill="none">
    <!-- blue branch (up) -->
    <path d="M60 30 V16" stroke="#2f6ef5"/>
    <path d="M60 16 L54 10 M60 16 L66 10" stroke="#2f6ef5"/>
    <!-- green branch (upper-left) -->
    <path d="M60 30 L44 21" stroke="#36a852"/>
    <path d="M44 21 L37 18 M44 21 L43 13" stroke="#36a852"/>
    <!-- teal branch (upper-right) -->
    <path d="M60 30 L76 21" stroke="#1aa39a"/>
    <path d="M76 21 L83 18 M76 21 L77 13" stroke="#1aa39a"/>
    <!-- red branch (left) -->
    <path d="M60 30 L43 31" stroke="#e8634a"/>
    <path d="M43 31 L36 29 M43 31 L40 37" stroke="#e8634a"/>
    <!-- orange branch (right) -->
    <path d="M60 30 L77 31" stroke="#e8902a"/>
    <path d="M77 31 L84 29 M77 31 L80 37" stroke="#e8902a"/>
  </g>
  <!-- leaf dots -->
  <g>
    <circle cx="54" cy="10" r="3" fill="#2f6ef5"/><circle cx="66" cy="10" r="3" fill="#2f6ef5"/>
    <circle cx="37" cy="18" r="3" fill="#36a852"/><circle cx="43" cy="13" r="3" fill="#36a852"/>
    <circle cx="83" cy="18" r="3" fill="#1aa39a"/><circle cx="77" cy="13" r="3" fill="#1aa39a"/>
    <circle cx="36" cy="29" r="3" fill="#e8634a"/><circle cx="40" cy="37" r="3" fill="#e8634a"/>
    <circle cx="84" cy="29" r="3" fill="#e8902a"/><circle cx="80" cy="37" r="3" fill="#e8902a"/>
    <circle cx="60" cy="30" r="4" fill="#15294f"/>
  </g>
  <!-- purple connectors from hub down to the two figures -->
  <g stroke="#8b46d9" stroke-width="3" stroke-linecap="round" fill="none">
    <path d="M60 33 Q47 42 36 53"/>
    <path d="M60 33 Q73 42 84 53"/>
  </g>

  <!-- ===== human (left) ===== -->
  <g stroke="#15294f" stroke-width="3.4" stroke-linecap="round" stroke-linejoin="round" fill="#ffffff">
    <circle cx="34" cy="66" r="9"/>
    <path d="M20 100 v-4 a14 14 0 0 1 28 0 v4"/>
  </g>

  <!-- ===== agent / robot (right) ===== -->
  <g stroke="#15294f" stroke-width="3.4" stroke-linecap="round" stroke-linejoin="round">
    <!-- ears -->
    <rect x="66" y="68" width="5" height="13" rx="2.5" fill="#ffffff"/>
    <rect x="97" y="68" width="5" height="13" rx="2.5" fill="#ffffff"/>
    <!-- head -->
    <rect x="69" y="58" width="30" height="32" rx="8" fill="#ffffff"/>
    <!-- eyes -->
    <rect x="77" y="67" width="5" height="13" rx="2.5" fill="#15294f" stroke="none"/>
    <rect x="86" y="67" width="5" height="13" rx="2.5" fill="#15294f" stroke="none"/>
    <!-- stand -->
    <path d="M84 90 v5"/>
    <path d="M77 100 l3.5 -5 h7 l3.5 5 z" fill="#ffffff"/>
  </g>
</svg>
